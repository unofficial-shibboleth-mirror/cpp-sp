[Status]
type = Status
acl = 127.0.0.1 ::1

[Session]
type = Session
#showAttributeValues = false

[Login]
type = SessionInitiator

[Validate]
type = TokenConsumer

[Logout]
type = LogoutInitiator
# true suppresses single logout requests
#localOnly = false

[SingleLogout]
type = LogoutConsumer
# true requires valid logout request matching active session
#matchRequired = false

